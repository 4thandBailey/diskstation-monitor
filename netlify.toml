[build]
  base    = "frontend"
  command = "mkdir -p dist && cp -r public/. dist/"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/"
  to     = "/dsm-auth.html"
  status = 200

[[redirects]]
  from   = "/dashboard"
  to     = "/synology-monitor.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/dsm-auth.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com; connect-src 'self' https://diskstation-monitor-production.up.railway.app https://nominatim.openstreetmap.org"
