[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "https://diskstation-monitor-production.up.railway.app"

[[redirects]]
  from   = "/"
  to     = "/dsm-auth.html"
  status = 200

[[redirects]]
  from   = "/dashboard"
  to     = "/synology-monitor.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/dsm-auth.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org; connect-src 'self' https://diskstation-monitor-production.up.railway.app https://nominatim.openstreetmap.org"
